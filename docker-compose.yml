# ────────────────────────────────────────────────────────
#  financial-data-etl  ·  Local development stack
#
#  Services:
#    postgres   — PostgreSQL 16 (data layer)
#    api        — FastAPI live streaming (always running)
#    etl        — Batch pipeline (run on demand)
#    frontend   — Nginx serving React SPA
#
#  Usage:
#    docker compose up -d                 # start Postgres + API + Frontend
#    docker compose run etl --dji         # run ETL for Dow Jones
#    docker compose down                  # stop everything
# ────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (data layer) ─────────────────────────
  # AWS equivalent: RDS PostgreSQL (managed, Multi-AZ)
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d financial_data"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Live Streaming API (always-on) ──────────────────
  # AWS equivalent: ECS Fargate Service (desired_count=1)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=1
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Batch ETL (on-demand) ───────────────────────────
  # AWS equivalent: ECS Fargate Task (run via EventBridge/cron)
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
    entrypoint: ["python", "-m", "financial_data_etl.main_runner"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # ── Frontend (Nginx + React SPA) ────────────────────
  # AWS equivalent: S3 bucket + CloudFront distribution
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
    # Named volume for PostgreSQL data. Persists across container restarts.
    # This is the equivalent of an EBS volume attached to RDS in AWS.
