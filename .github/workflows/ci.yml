name: CI

# ──────────────────────────────────────────────────────────────────────────────
# Continuous Integration (P0_02)
#
# Runs on every push to any branch and on every PR targeting main.
# Two independent jobs so failures are visually isolated in the GitHub UI:
#   - lint  → ruff over tests/  (fast, ~10s)
#   - test  → pytest over tests/ (deterministic, no network, no DB, ~15s)
#
# Integration tests marked with `@pytest.mark.integration` are NOT run here
# (they hit TradingView + PostgreSQL). Run them locally with:
#     pytest -m integration
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch when a new push arrives.
# Saves GitHub Actions minutes and gives faster feedback on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # LINT JOB — ruff over tests/ only (gradual mode)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip && pip install "ruff>=0.4"

      - name: Run ruff check
        run: ruff check .

  # ────────────────────────────────────────────────────────────────────────────
  # TEST JOB — pytest over tests/ (unit tests only, integration deselected)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short
